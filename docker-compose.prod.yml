services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnxray-backend-prod
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-db:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/vulnxray.db
      - LOG_LEVEL=WARNING
    env_file:
      - ./backend/.env
    networks:
      - vulnxray-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vulnxray-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    networks:
      - vulnxray-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vulnxray-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  backend-db:
    driver: local

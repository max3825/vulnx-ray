services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnxray-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - vulnxray-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vulnxray-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - vulnxray-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  vulnxray-network:
    driver: bridge

volumes:
  backend-data:

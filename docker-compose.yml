services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnxray-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://vulnxray:vulnxray_password@db:5432/vulnxray_db
    networks:
      - vulnxray-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: vulnxray-db
    environment:
      POSTGRES_USER: vulnxray
      POSTGRES_PASSWORD: vulnxray_password
      POSTGRES_DB: vulnxray_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - vulnxray-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnxray -d vulnxray_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vulnxray-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - vulnxray-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  vulnxray-network:
    driver: bridge

volumes:
  backend-data:
  db-data:
